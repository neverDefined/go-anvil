version: "2"

run:
  timeout: 5m
  tests: true

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - misspell
    - unconvert
    - unparam
    - prealloc
    - whitespace
    - gocyclo
    - dupl
    - gosec
    - revive

  settings:
    errcheck:
      check-type-assertions: true

    misspell:
      locale: US

    gosec:
      excludes:
        - G204 # Subprocess with variable — required for spawning anvil
        - G115 # Integer conversions — safe in this context

    gocyclo:
      min-complexity: 15

    dupl:
      threshold: 100

    revive:
      rules:
        - name: exported
          disabled: true # AnvilConfig / AnvilBuilder package-prefixed names are intentional

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - dupl
          - gocyclo
          - gosec
