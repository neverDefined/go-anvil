version: "2"

run:
  timeout: 5m
  tests: true

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - misspell
    - unconvert
    - unparam
    - prealloc
    - whitespace
    - gocyclo
    - dupl
    - gosec
    - revive

linters-settings:
  errcheck:
    check-type-assertions: true
    
  govet:
    shadow: true
    
  misspell:
    locale: US
    
  gosec:
    excludes:
      - G204 # Subprocess with variable - we need this for anvil
      - G115 # Integer conversions - safe in our context
    
  gocyclo:
    min-complexity: 15
    
  dupl:
    threshold: 100
    
  revive:
    rules:
      - name: exported
        disabled: true # AnvilConfig, AnvilBuilder etc. names are intentionally prefixed

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - dupl
        - gocyclo
