version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: UTC
    open-pull-requests-limit: 5
    groups:
      gomod-minor-patch:
        update-types:
          - minor
          - patch
    ignore:
      - dependency-name: github.com/ethereum/go-ethereum
        update-types:
          - version-update:semver-major
    labels:
      - area:ci
      - type:chore
    commit-message:
      prefix: chore(deps)
      include: scope

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: UTC
    open-pull-requests-limit: 5
    groups:
      actions-minor-patch:
        update-types:
          - minor
          - patch
    labels:
      - area:ci
      - type:chore
    commit-message:
      prefix: chore(ci)
      include: scope
